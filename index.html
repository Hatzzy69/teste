<html>
    <head>
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            a {
                text-decoration: none;
            }

            .box {
                font-size: 20px;
                color: white;
                height: 250px;
                width: 350px;
                border-radius: 15px;
                background: #191919;
                flex-direction: column;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .buttons-container {
                display: flex;
                justify-content: space-around;
                height: 50px;
                width: 150px;
            }

            button {
                height: 30px;
                width: 50px;
                background: white;
                border-radius: 5px;
                color: black;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <p>Bora jogar hoje?</p>
            <div class="buttons-container">
                <button>
                    <a href="https://i.ytimg.com/vi/4VEVVhqqz4k/hq2.jpg?sqp=-oaymwEoCOADEOgC8quKqQMcGADwAQH4AZQDgALQBYoCDAgAEAEYKyBlKB4wDw==&rs=AOn4CLCteDVkAL3VYS0te5yfJ5G2GAS2BQ">Sim</a>
                </button>
                <button id="no">Nao</button>
            </div>
        </div>
    </body>
    <script>
        let button = document.getElementById('no');
        let height = window.innerHeight - 50;
        let width = window.innerWidth -50;

        button.addEventListener('mouseover', function () {
            button.style.position = "absolute";
            button.style.top = Math.random() * height + "px";
            button.style.left = Math.random() * width + "px";
        })
    </script>
</html>
